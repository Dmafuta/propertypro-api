name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_ADDRESS: ${{ secrets.SMTP_FROM_ADDRESS }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          AT_USERNAME: ${{ secrets.AT_USERNAME }}
          AT_API_KEY: ${{ secrets.AT_API_KEY }}
          AT_SENDER_ID: ${{ secrets.AT_SENDER_ID }}
          AT_SANDBOX: ${{ secrets.AT_SANDBOX }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          JWT_ACCESS_TOKEN_MINUTES: ${{ secrets.JWT_ACCESS_TOKEN_MINUTES }}
          JWT_REFRESH_TOKEN_DAYS: ${{ secrets.JWT_REFRESH_TOKEN_DAYS }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 30m
          envs: DB_PASSWORD,SMTP_HOST,SMTP_PORT,SMTP_USE_SSL,SMTP_USERNAME,SMTP_PASSWORD,SMTP_FROM_ADDRESS,SMTP_FROM_NAME,AT_USERNAME,AT_API_KEY,AT_SENDER_ID,AT_SANDBOX,JWT_SECRET,JWT_ISSUER,JWT_AUDIENCE,JWT_ACCESS_TOKEN_MINUTES,JWT_REFRESH_TOKEN_DAYS,NEXTAUTH_SECRET,GH_PAT
          script: |
            set -e

            # ── Pull API repo ─────────────────────────────────────────────────
            echo ">>> Pulling API repo..."
            cd /root/propertypro-api
            rm -f .git/refs/remotes/origin/main
            git fetch origin main
            git reset --hard FETCH_HEAD

            # ── Pull / clone web (Next.js) repo ───────────────────────────────
            echo ">>> Pulling web repo..."
            if [ -d /root/propertypro-web/.git ]; then
              cd /root/propertypro-web
              rm -f .git/refs/remotes/origin/main
              git fetch origin main
              git reset --hard FETCH_HEAD
            else
              rm -rf /root/propertypro-web
              git clone https://${GH_PAT}@github.com/Dmafuta/propertypro-web.git /root/propertypro-web
            fi

            # ── Write .env from CI secrets ────────────────────────────────────
            # esc: replace $ with $$ so docker-compose doesn't interpolate values
            esc() { printf '%s' "$1" | sed 's/\$/\$\$/g'; }

            echo ">>> Writing .env..."
            cd /root/propertypro-api/deploy
            {
            echo "DB_PASSWORD=$(esc "${DB_PASSWORD}")"
            echo "SMTP_HOST=$(esc "${SMTP_HOST}")"
            echo "SMTP_PORT=$(esc "${SMTP_PORT}")"
            echo "SMTP_USE_SSL=$(esc "${SMTP_USE_SSL}")"
            echo "SMTP_USERNAME=$(esc "${SMTP_USERNAME}")"
            echo "SMTP_PASSWORD=$(esc "${SMTP_PASSWORD}")"
            echo "SMTP_FROM_ADDRESS=$(esc "${SMTP_FROM_ADDRESS}")"
            echo "SMTP_FROM_NAME=$(esc "${SMTP_FROM_NAME}")"
            echo "AT_USERNAME=$(esc "${AT_USERNAME}")"
            echo "AT_API_KEY=$(esc "${AT_API_KEY}")"
            echo "AT_SENDER_ID=$(esc "${AT_SENDER_ID}")"
            echo "AT_SANDBOX=$(esc "${AT_SANDBOX}")"
            echo "JWT_SECRET=$(esc "${JWT_SECRET}")"
            echo "JWT_ISSUER=$(esc "${JWT_ISSUER}")"
            echo "JWT_AUDIENCE=$(esc "${JWT_AUDIENCE}")"
            echo "JWT_ACCESS_TOKEN_MINUTES=$(esc "${JWT_ACCESS_TOKEN_MINUTES}")"
            echo "JWT_REFRESH_TOKEN_DAYS=$(esc "${JWT_REFRESH_TOKEN_DAYS}")"
            echo "NEXTAUTH_SECRET=$(esc "${NEXTAUTH_SECRET}")"
            } > .env

            # ── Rebuild and restart containers ────────────────────────────────
            echo ">>> Cleaning up all deploy project containers and networks..."
            # Remove by compose label (handles any naming format)
            docker ps -aq --filter label=com.docker.compose.project=deploy | xargs -r docker rm -f 2>/dev/null || true
            # Also remove by name as fallback
            docker rm -f deploy-db-1 deploy-app-1 deploy-web-1 deploy-caddy-1 2>/dev/null || true
            # Remove networks so compose starts fully fresh
            docker network rm deploy_web deploy_internal 2>/dev/null || true
            sleep 2

            echo ">>> Rebuilding containers..."
            docker compose up -d --build

            # ── Wait for app to be healthy ────────────────────────────────────
            echo ">>> Waiting for app to be healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker compose ps --format json app 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health','unknown'))" 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "App is healthy."
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 3
            done

            echo ">>> Container status:"
            docker compose ps

            echo ">>> App logs (last 20 lines):"
            docker compose logs --tail=20 app

            echo ">>> Web logs (last 20 lines):"
            docker compose logs --tail=20 web

            echo ">>> Checking /health endpoint..."
            curl -sf http://localhost:8080/health || echo "Health check returned non-200 (check logs)"

            echo ">>> Checking web on port 3000..."
            curl -sf http://localhost:3000/ -o /dev/null -w "web HTTP status: %{http_code}\n" || echo "web container not reachable on 3000"

            echo ">>> Deploy complete."
