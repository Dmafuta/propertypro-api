name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: DB_PASSWORD,SMTP_HOST,SMTP_PORT,SMTP_USE_SSL,SMTP_USERNAME,SMTP_PASSWORD,SMTP_FROM_ADDRESS,SMTP_FROM_NAME,AT_USERNAME,AT_API_KEY,AT_SENDER_ID,AT_SANDBOX,JWT_SECRET,JWT_ISSUER,JWT_AUDIENCE,JWT_ACCESS_TOKEN_MINUTES,JWT_REFRESH_TOKEN_DAYS,ALLOWED_ORIGINS
          script: |
            set -e

            cd "${{ secrets.VPS_DEPLOY_PATH }}"

            echo ">>> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo ">>> Writing .env from CI secrets..."
            {
            echo "DB_PASSWORD=${DB_PASSWORD}"
            echo "SMTP_HOST=${SMTP_HOST}"
            echo "SMTP_PORT=${SMTP_PORT}"
            echo "SMTP_USE_SSL=${SMTP_USE_SSL}"
            echo "SMTP_USERNAME=${SMTP_USERNAME}"
            echo "SMTP_PASSWORD=${SMTP_PASSWORD}"
            echo "SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS}"
            echo "SMTP_FROM_NAME=${SMTP_FROM_NAME}"
            echo "AT_USERNAME=${AT_USERNAME}"
            echo "AT_API_KEY=${AT_API_KEY}"
            echo "AT_SENDER_ID=${AT_SENDER_ID}"
            echo "AT_SANDBOX=${AT_SANDBOX}"
            echo "JWT_SECRET=${JWT_SECRET}"
            echo "JWT_ISSUER=${JWT_ISSUER}"
            echo "JWT_AUDIENCE=${JWT_AUDIENCE}"
            echo "JWT_ACCESS_TOKEN_MINUTES=${JWT_ACCESS_TOKEN_MINUTES}"
            echo "JWT_REFRESH_TOKEN_DAYS=${JWT_REFRESH_TOKEN_DAYS}"
            } > deploy/.env

            echo ">>> Rebuilding and restarting containers..."
            cd deploy
            docker compose up -d --build --remove-orphans

            echo ">>> Waiting for app to be healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker compose ps --format json app 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health','unknown'))" 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "App is healthy."
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 3
            done

            echo ">>> Checking /health endpoint..."
            curl -sf http://localhost:8080/health || echo "Health check returned non-200 (check logs)"

            echo ">>> Deploy complete."
