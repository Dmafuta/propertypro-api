name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_ADDRESS: ${{ secrets.SMTP_FROM_ADDRESS }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          AT_USERNAME: ${{ secrets.AT_USERNAME }}
          AT_API_KEY: ${{ secrets.AT_API_KEY }}
          AT_SENDER_ID: ${{ secrets.AT_SENDER_ID }}
          AT_SANDBOX: ${{ secrets.AT_SANDBOX }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          JWT_ACCESS_TOKEN_MINUTES: ${{ secrets.JWT_ACCESS_TOKEN_MINUTES }}
          JWT_REFRESH_TOKEN_DAYS: ${{ secrets.JWT_REFRESH_TOKEN_DAYS }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: DB_PASSWORD,SMTP_HOST,SMTP_PORT,SMTP_USE_SSL,SMTP_USERNAME,SMTP_PASSWORD,SMTP_FROM_ADDRESS,SMTP_FROM_NAME,AT_USERNAME,AT_API_KEY,AT_SENDER_ID,AT_SANDBOX,JWT_SECRET,JWT_ISSUER,JWT_AUDIENCE,JWT_ACCESS_TOKEN_MINUTES,JWT_REFRESH_TOKEN_DAYS,NEXTAUTH_SECRET,GH_PAT
          script: |
            set -e

            # ── Pull API repo ─────────────────────────────────────────────────
            echo ">>> Pulling API repo..."
            cd /root/propertypro-api
            git fetch origin main
            git reset --hard origin/main

            # ── Pull / clone web (Next.js) repo ───────────────────────────────
            echo ">>> Pulling web repo..."
            if [ -d /root/propertypro-web ]; then
              cd /root/propertypro-web
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://${GH_PAT}@github.com/Dmafuta/propertypro-web.git /root/propertypro-web
            fi

            # ── Write .env from CI secrets ────────────────────────────────────
            echo ">>> Writing .env..."
            cd /root/propertypro-api/deploy
            {
            echo "DB_PASSWORD=${DB_PASSWORD}"
            echo "SMTP_HOST=${SMTP_HOST}"
            echo "SMTP_PORT=${SMTP_PORT}"
            echo "SMTP_USE_SSL=${SMTP_USE_SSL}"
            echo "SMTP_USERNAME=${SMTP_USERNAME}"
            echo "SMTP_PASSWORD=${SMTP_PASSWORD}"
            echo "SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS}"
            echo "SMTP_FROM_NAME=${SMTP_FROM_NAME}"
            echo "AT_USERNAME=${AT_USERNAME}"
            echo "AT_API_KEY=${AT_API_KEY}"
            echo "AT_SENDER_ID=${AT_SENDER_ID}"
            echo "AT_SANDBOX=${AT_SANDBOX}"
            echo "JWT_SECRET=${JWT_SECRET}"
            echo "JWT_ISSUER=${JWT_ISSUER}"
            echo "JWT_AUDIENCE=${JWT_AUDIENCE}"
            echo "JWT_ACCESS_TOKEN_MINUTES=${JWT_ACCESS_TOKEN_MINUTES}"
            echo "JWT_REFRESH_TOKEN_DAYS=${JWT_REFRESH_TOKEN_DAYS}"
            echo "NEXTAUTH_SECRET=${NEXTAUTH_SECRET}"
            } > .env

            # ── Rebuild and restart containers ────────────────────────────────
            echo ">>> Rebuilding containers..."
            docker compose up -d --build --remove-orphans

            # ── Wait for app to be healthy ────────────────────────────────────
            echo ">>> Waiting for app to be healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker compose ps --format json app 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health','unknown'))" 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "App is healthy."
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 3
            done

            echo ">>> Checking /health endpoint..."
            curl -sf http://localhost:8080/health || echo "Health check returned non-200 (check logs)"

            echo ">>> Deploy complete."
