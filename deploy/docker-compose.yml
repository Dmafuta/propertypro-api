services:

  app:
    build:
      context: ../FacilityApp
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      AllowedOrigins__0: "https://greatwallgardens.estate"
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=facilityapp;Username=facilityapp;Password=${DB_PASSWORD}"
      Smtp__Host: "${SMTP_HOST}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__UseSsl: "${SMTP_USE_SSL:-false}"
      Smtp__UserName: "${SMTP_USERNAME}"
      Smtp__Password: "${SMTP_PASSWORD}"
      Smtp__FromAddress: "${SMTP_FROM_ADDRESS}"
      Smtp__FromName: "${SMTP_FROM_NAME:-PropertyPro}"
      AfricasTalking__Username: "${AT_USERNAME}"
      AfricasTalking__ApiKey: "${AT_API_KEY}"
      AfricasTalking__SenderId: "${AT_SENDER_ID}"
      AfricasTalking__Sandbox: "${AT_SANDBOX:-false}"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "${JWT_ISSUER:-FacilityApp}"
      Jwt__Audience: "${JWT_AUDIENCE:-FacilityApp}"
      Jwt__AccessTokenMinutes: "${JWT_ACCESS_TOKEN_MINUTES:-60}"
      Jwt__RefreshTokenDays: "${JWT_REFRESH_TOKEN_DAYS:-30}"
    expose:
      - "8080"
    networks:
      - internal
      - web
    volumes:
      - uploads:/app/wwwroot/uploads
      - documents:/app/wwwroot/documents
      - dataprotection:/app/keys

  web:
    build:
      context: /root/propertypro-web/facility-app-web
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - app
    environment:
      NEXTAUTH_URL: "https://greatwallgardens.estate"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NODE_ENV: production
    expose:
      - "3000"
    networks:
      - web

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: facilityapp
      POSTGRES_USER: facilityapp
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facilityapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - app
      - web

volumes:
  pgdata:
  uploads:
  documents:
  dataprotection:
  caddy_data:
  caddy_config:

networks:
  internal:
  web:
