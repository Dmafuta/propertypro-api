services:

  app:
    build:
      context: ../FacilityApp
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=facilityapp;Username=facilityapp;Password=${DB_PASSWORD}"
      Smtp__Host: "${SMTP_HOST}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__UseSsl: "${SMTP_USE_SSL:-false}"
      Smtp__UserName: "${SMTP_USERNAME}"
      Smtp__Password: "${SMTP_PASSWORD}"
      Smtp__FromAddress: "${SMTP_FROM_ADDRESS}"
      Smtp__FromName: "${SMTP_FROM_NAME:-FacilityApp}"
    expose:
      - "8080"
    networks:
      - internal
      - web
    volumes:
      - uploads:/app/wwwroot/uploads
      - documents:/app/wwwroot/documents
      - dataprotection:/app/keys

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: facilityapp
      POSTGRES_USER: facilityapp
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facilityapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
  documents:
  dataprotection:
  caddy_data:
  caddy_config:

networks:
  internal:
  web:
